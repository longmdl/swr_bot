version: '3.8'

services:
  bot:
    build: .
    container_name: race_director_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-race_user}:${MONGO_PASSWORD:-race_password}@db:27017/${MONGO_DB:-race_db}?authSource=admin

  db:
    image: mongo:6-jammy
    container_name: race_director_mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-race_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-race_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-race_db}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongo_data: